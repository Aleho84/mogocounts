version: '3.8'

services:
  mongo:
    image: mongo:4.4.18
    container_name: mogocounts-db
    restart: always
    volumes:
      - ./data/db:/data/db
    networks:
      - mogo-network

  server:
    build: ./server
    container_name: mogocounts-server
    restart: always
    environment:
      - MONGODB_URI=mongodb://mongo:27017/mogocounts
      - PORT=5000
    depends_on:
      - mongo
    networks:
      - mogo-network

  client:
    build: ./client
    container_name: mogocounts-client
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt/live/mogocounts.sytes.net/fullchain.pem:/etc/nginx/certs/server.crt:ro
      - /etc/letsencrypt/live/mogocounts.sytes.net/privkey.pem:/etc/nginx/certs/server.key:ro
    depends_on:
      - server
    networks:
      - mogo-network

networks:
  mogo-network:
    driver: bridge
